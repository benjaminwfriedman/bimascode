<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM as Code Preview</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1><span class="accent">BIM</span> as Code Preview</h1>
            </div>
            <div class="header-center">
                <label for="view-select">View:</label>
                <select id="view-select">
                    <option value="">-- Select View --</option>
                </select>
            </div>
            <div class="header-right">
                <span class="connection-status" id="connection-status">
                    <span class="status-dot" id="status-dot"></span>
                    <span class="status-text" id="status-text">Connecting...</span>
                </span>
            </div>
        </header>

        <!-- Main content with split panes -->
        <main class="main-content">
            <div class="pane pane-2d" id="pane-2d">
                <div class="pane-header">
                    <span>2D Floor Plan</span>
                    <span class="pane-info" id="info-2d"></span>
                </div>
                <div class="pane-content" id="container-2d">
                    <canvas id="canvas-2d"></canvas>
                    <div class="empty-state" id="empty-2d">
                        <span class="empty-icon">&#9634;</span>
                        <span>No view selected</span>
                    </div>
                </div>
            </div>
            <div class="divider" id="divider"></div>
            <div class="pane pane-3d" id="pane-3d">
                <div class="pane-header">
                    <span>3D Model</span>
                    <span class="pane-info" id="info-3d"></span>
                </div>
                <div class="pane-content" id="container-3d">
                    <div class="empty-state" id="empty-3d">
                        <span class="empty-icon">&#9634;</span>
                        <span>Loading model...</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-left">
                <button id="btn-download-ifc" class="btn btn-primary" disabled>
                    Download IFC
                </button>
                <button id="btn-fit-2d" class="btn">Fit 2D</button>
                <button id="btn-fit-3d" class="btn">Fit 3D</button>
            </div>
            <div class="footer-right">
                <span id="footer-status">Ready</span>
            </div>
        </footer>

        <!-- Error overlay -->
        <div class="error-overlay" id="error-overlay">
            <div class="error-content">
                <div class="error-header">
                    <span class="error-icon">!</span>
                    <span class="error-title">Script Error</span>
                    <button class="error-close" id="error-close">&times;</button>
                </div>
                <div class="error-message" id="error-message"></div>
                <pre class="error-traceback" id="error-traceback"></pre>
            </div>
        </div>
    </div>

    <script type="module" src="viewer.js"></script>
</body>
</html>
